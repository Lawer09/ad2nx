name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch:    # 支持手动触发
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

env:
  BINARY_NAME: ad2nx
  BUILD_TAGS: "sing xray hysteria2 with_quic with_grpc with_utls with_wireguard with_acme with_gvisor"
  GOEXPERIMENT: jsonv2

jobs:
  build:
    name: Build - ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
        #   - goos: linux
        #     goarch: arm
        #     goarm: 7
        #   - goos: linux
        #     goarch: 386
          # 如需更多平台，取消下方注释
          # - goos: linux
          #   goarch: s390x
          # - goos: linux
          #   goarch: riscv64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOEXPERIMENT: ${{ env.GOEXPERIMENT }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build_assets

          echo "Building ${BINARY_NAME}..."
          go build -v -o "build_assets/${BINARY_NAME}" \
            -tags "${BUILD_TAGS}" \
            -trimpath \
            -ldflags "-X 'ad2nx/cmd.version=${{ steps.version.outputs.version }}' -s -w -buildid="

      - name: Package zip
        run: |
          ARCHIVE="${BINARY_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            ARCHIVE="${ARCHIVE}v${{ matrix.goarm }}"
          fi

          mkdir -p package
          cp build_assets/${BINARY_NAME} package/
          cp example/* package/

          cd package
          zip -r "../release/${ARCHIVE}.zip" .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: release/*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: List release files
        run: ls -lhR release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          body: |
            ## ad2nx ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

            ### Build Info
            - Build Tags: `${{ env.BUILD_TAGS }}`
            - Go Experiment: `${{ env.GOEXPERIMENT }}`

            ### Platforms
            | File | OS | Arch |
            |------|-----|------|
            | `ad2nx-linux-amd64.zip` | Linux | x86_64 |
            | `ad2nx-linux-arm64.zip` | Linux | ARM64 |

            ### Zip Contents
            - `ad2nx` — 二进制文件
            - `config.json` / `dns.json` / `route.json` — 示例配置
            - `custom_inbound.json` / `custom_outbound.json` — 自定义出入站示例
            - `geoip.dat` / `geoip.db` / `geosite.dat` / `geosite.db` — GEO 数据文件
          files: release_assets/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
